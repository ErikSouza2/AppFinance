<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Finance • Gestão Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; overflow-x: hidden; }

        .animated-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: radial-gradient(ellipse at 20% 30%, #eef2ff, #e0e7ff, #f8fafc);
            animation: subtleShift 18s ease infinite alternate;
        }

        @keyframes subtleShift {
            0% { background: radial-gradient(ellipse at 20% 30%, #eef2ff, #e0e7ff, #f8fafc); }
            100% { background: radial-gradient(ellipse at 85% 70%, #fdf4ff, #ede9fe, #f1f5f9); }
        }

        .noise-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='1' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.045'/%3E%3C/svg%3E");
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08);
        }

        .glass-card-dark {
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.12);
        }

        .tab-income-active { background: #10b981; color: white; }
        .tab-expense-active { background: #f43f5e; color: white; }
        .hidden { display: none; }
        
        .pix-gradient-new { background: linear-gradient(135deg, #00D4B5 0%, #20B2AA 100%); }
    </style>
</head>
<body>

<div class="animated-bg"></div>
<div class="noise-overlay"></div>

<div id="login-screen" class="min-h-screen flex items-center justify-center px-5 relative z-10">
    <div class="w-full max-w-md transform transition-all duration-500">
        <div class="glass-card rounded-3xl p-8 shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-20 h-20 mx-auto bg-gradient-to-tr from-indigo-500 to-indigo-700 rounded-2xl flex items-center justify-center shadow-xl mb-5 ring-4 ring-indigo-100">
                    <i class="ri-rfid-line text-4xl text-white"></i>
                </div>
                <h1 class="text-3xl font-extrabold bg-gradient-to-r from-indigo-700 to-slate-800 bg-clip-text text-transparent">Finance</h1>
                <p class="text-slate-500 text-sm mt-1">O app feito para você</p>
            </div>

            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1 ml-1">Usuário</label>
                    <div class="relative">
                        <i class="ri-user-line absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="text" id="username" placeholder="Seu nome" required
                            class="w-full pl-11 pr-4 py-3.5 bg-white/70 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none transition-all">
                    </div>
                </div>
                <div>
                    <label class="block text-[11px] font-semibold text-slate-500 uppercase tracking-wide mb-1 ml-1">Senha</label>
                    <div class="relative">
                        <i class="ri-lock-line absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                        <input type="password" id="password" placeholder="••••••••" required
                            class="w-full pl-11 pr-4 py-3.5 bg-white/70 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none transition-all">
                    </div>
                </div>
                
                <div id="login-error-container" class="hidden space-y-3">
                    <p class="text-xs text-rose-600 font-medium flex items-center gap-1 bg-rose-50 p-3 rounded-xl border border-rose-100">
                        <i class="ri-error-warning-line"></i> Senha incorreta!
                    </p>
                    <button type="button" onclick="resetPassword()" class="w-full text-xs font-bold text-indigo-600 hover:text-indigo-800 transition-colors py-1">
                        Esqueceu sua senha? Criar uma nova
                    </button>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-indigo-600 to-indigo-700 text-white py-3.5 rounded-2xl font-bold shadow-lg hover:shadow-xl transition-all transform active:scale-95 flex items-center justify-center gap-2">
                    <i class="ri-login-circle-line text-xl"></i> Entrar no App
                </button>
            </form>
            <p class="text-center text-[11px] text-slate-400 mt-6">Primeira vez? Digite o usuário e crie sua senha.</p>
        </div>
    </div>
</div>

<div id="app-content" class="hidden relative z-10">
    <header class="glass-card sticky top-4 z-50 mx-4 md:mx-auto max-w-6xl rounded-2xl shadow-md mb-6">
        <div class="px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600">
                    <i class="ri-rfid-line text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold text-slate-800 tracking-tight">Finance<span class="text-indigo-500">.</span></h1>
                    <p class="text-[11px] text-slate-500 font-medium italic">O app feito para você | Olá, <span id="user-display-name" class="font-bold text-indigo-600 uppercase"></span></p>
                </div>
            </div>
            <button onclick="logout()" class="w-9 h-9 flex items-center justify-center rounded-xl bg-slate-100 text-slate-500 hover:bg-rose-50 hover:text-rose-500 transition-all">
                <i class="ri-logout-box-r-line text-lg"></i>
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 md:px-6 pb-12">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-5 mb-10">
            <div class="glass-card-dark rounded-2xl p-6 text-white shadow-xl">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-xs font-medium tracking-wider opacity-70">SALDO DISPONÍVEL</p>
                        <h2 id="balance" class="text-3xl font-extrabold tracking-tight mt-1">R$ 0,00</h2>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center"><i class="ri-wallet-3-line text-xl"></i></div>
                </div>
            </div>
            <div class="bg-white/70 backdrop-blur-md rounded-2xl p-6 border border-white/60 shadow-md">
                <div class="flex justify-between">
                    <div>
                        <p class="text-xs font-bold text-emerald-600 tracking-wider">ENTRADAS</p>
                        <h2 id="income" class="text-2xl font-bold text-slate-800 mt-1">R$ 0,00</h2>
                    </div>
                    <i class="ri-arrow-up-circle-line text-3xl text-emerald-400"></i>
                </div>
            </div>
            <div class="bg-white/70 backdrop-blur-md rounded-2xl p-6 border border-white/60 shadow-md">
                <div class="flex justify-between">
                    <div>
                        <p class="text-xs font-bold text-rose-500 tracking-wider">SAÍDAS</p>
                        <h2 id="expense" class="text-2xl font-bold text-slate-800 mt-1">R$ 0,00</h2>
                    </div>
                    <i class="ri-arrow-down-circle-line text-3xl text-rose-400"></i>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-7">
            <div class="lg:col-span-5 space-y-6">
                <div class="bg-white/70 backdrop-blur-lg rounded-3xl border border-white/70 p-6 shadow-xl">
                    <h3 class="text-xl font-extrabold text-slate-700 flex items-center gap-2 mb-5">Nova movimentação</h3>
                    <div class="flex gap-2 mb-7 p-1 bg-slate-100/70 rounded-2xl">
                        <button type="button" onclick="setType('income')" id="type-income" class="flex-1 py-3 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2 tab-income-active">Entrada</button>
                        <button type="button" onclick="setType('expense')" id="type-expense" class="flex-1 py-3 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-2 text-slate-500">Saída</button>
                    </div>
                    <form id="finance-form" class="space-y-5">
                        <input type="text" id="desc" placeholder="Descrição" required class="w-full px-4 py-3.5 bg-slate-50/80 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none">
                        <input type="number" step="0.01" id="amount" placeholder="Valor (R$)" required class="w-full px-4 py-3.5 bg-slate-50/80 border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-400 outline-none">
                        <button type="submit" id="submit-btn" class="w-full font-bold py-3.5 rounded-xl bg-emerald-500 text-white shadow-md active:scale-95 transition-all">Confirmar Entrada</button>
                    </form>
                </div>

                <div class="bg-gradient-to-br from-indigo-50 to-purple-50/70 rounded-3xl p-6 border border-indigo-100">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-12 h-12 pix-gradient-new rounded-2xl flex items-center justify-center text-white"><i class="ri-qr-code-line text-2xl"></i></div>
                        <div>
                            <h4 class="text-base font-extrabold text-indigo-800">Apoie o projeto</h4>
                            <p class="text-xs text-indigo-500">Finance: o app feito para você</p>
                        </div>
                    </div>
                    <div class="bg-white rounded-2xl p-5 flex flex-col items-center gap-3">
                        <img id="pix-qr" src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=00020126500014BR.GOV.BCB.PIX0128ligeirinhoflogs225@gmail.com52040000530398654042.505802BR5925Erik Meyrelles dos Santos6009SAO PAULO62140510Q9W1bKox3Q6304FE59" class="w-28 h-28">
                        <button onclick="copyPix()" class="text-xs font-mono bg-indigo-50 text-indigo-700 px-5 py-2 rounded-full">Copiar código Pix</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-7">
                <div class="flex items-center justify-between mb-4 px-1">
                    <h3 class="text-xl font-extrabold text-slate-800">Extrato recente</h3>
                    <button onclick="clearData()" class="text-[11px] font-semibold text-slate-400 hover:text-rose-500">Limpar tudo</button>
                </div>
                <div class="rounded-3xl bg-white/50 backdrop-blur-md border border-white/50 shadow-xl p-1 max-h-[540px] overflow-y-auto">
                    <ul id="history-list" class="divide-y divide-slate-100/80"></ul>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    const loginForm = document.getElementById('login-form');
    const loginScreen = document.getElementById('login-screen');
    const appContent = document.getElementById('app-content');
    const financeForm = document.getElementById('finance-form');
    const historyList = document.getElementById('history-list');
    const balanceEl = document.getElementById('balance');
    const incomeEl = document.getElementById('income');
    const expenseEl = document.getElementById('expense');
    const submitBtn = document.getElementById('submit-btn');
    const errorContainer = document.getElementById('login-error-container');

    const PIX_CODE = "00020126500014BR.GOV.BCB.PIX0128ligeirinhoflogs225@gmail.com52040000530398654042.505802BR5925Erik Meyrelles dos Santos6009SAO PAULO62140510Q9W1bKox3Q6304FE59";

    let transactions = JSON.parse(localStorage.getItem('finance_v2')) || [];
    let registeredUsers = JSON.parse(localStorage.getItem('finance_auth_db')) || {};
    let currentType = 'income';

    // LÓGICA DE LOGIN COM CRIAÇÃO E VALIDAÇÃO
    loginForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const user = document.getElementById('username').value.trim().toLowerCase();
        const pass = document.getElementById('password').value;

        if (registeredUsers[user]) {
            // Se usuário existe, checa a senha
            if (registeredUsers[user] === pass) {
                startSession(user);
            } else {
                errorContainer.classList.remove('hidden');
            }
        } else {
            // Se não existe, cria nova conta com essa senha
            registeredUsers[user] = pass;
            localStorage.setItem('finance_auth_db', JSON.stringify(registeredUsers));
            alert(`Conta criada com sucesso para ${user}! Guarde sua senha.`);
            startSession(user);
        }
    });

    function resetPassword() {
        const user = document.getElementById('username').value.trim().toLowerCase();
        if (confirm(`Deseja realmente criar uma nova senha para o usuário "${user}"? Isso substituirá a senha anterior.`)) {
            const newPass = prompt("Digite sua nova senha:");
            if (newPass && newPass.length > 0) {
                registeredUsers[user] = newPass;
                localStorage.setItem('finance_auth_db', JSON.stringify(registeredUsers));
                alert("Senha atualizada! Agora você pode entrar.");
                errorContainer.classList.add('hidden');
                document.getElementById('password').value = "";
            }
        }
    }

    function startSession(user) {
        sessionStorage.setItem('active_session', user);
        errorContainer.classList.add('hidden');
        checkAuth();
    }

    function checkAuth() {
        const activeUser = sessionStorage.getItem('active_session');
        if (activeUser) {
            loginScreen.classList.add('hidden');
            appContent.classList.remove('hidden');
            document.getElementById('user-display-name').innerText = activeUser;
            updateUI();
        } else {
            loginScreen.classList.remove('hidden');
            appContent.classList.add('hidden');
            loginForm.reset();
        }
    }

    function logout() {
        sessionStorage.removeItem('active_session');
        checkAuth();
    }

    // LÓGICA FINANCEIRA
    function setType(type) {
        currentType = type;
        const btnInc = document.getElementById('type-income');
        const btnExp = document.getElementById('type-expense');
        if (type === 'income') {
            btnInc.className = 'flex-1 py-3 rounded-xl text-sm font-bold transition-all tab-income-active';
            btnExp.className = 'flex-1 py-3 rounded-xl text-sm font-bold transition-all text-slate-500';
            submitBtn.innerText = 'Confirmar Entrada';
            submitBtn.className = 'w-full font-bold py-3.5 rounded-xl bg-emerald-500 text-white shadow-md active:scale-95 transition-all';
        } else {
            btnExp.className = 'flex-1 py-3 rounded-xl text-sm font-bold transition-all tab-expense-active';
            btnInc.className = 'flex-1 py-3 rounded-xl text-sm font-bold transition-all text-slate-500';
            submitBtn.innerText = 'Confirmar Saída';
            submitBtn.className = 'w-full font-bold py-3.5 rounded-xl bg-rose-500 text-white shadow-md active:scale-95 transition-all';
        }
    }

    function formatCurrency(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    function updateUI() {
        const total = transactions.reduce((acc, t) => acc + t.amount, 0);
        const totalIn = transactions.filter(t => t.amount > 0).reduce((a, b) => a + b.amount, 0);
        const totalOut = transactions.filter(t => t.amount < 0).reduce((a, b) => a + Math.abs(b.amount), 0);

        balanceEl.innerText = formatCurrency(total);
        incomeEl.innerText = formatCurrency(totalIn);
        expenseEl.innerText = formatCurrency(totalOut);

        historyList.innerHTML = '';
        if (transactions.length === 0) {
            historyList.innerHTML = `<div class="text-center py-10 text-slate-400 text-sm">Vazio</div>`;
        } else {
            [...transactions].reverse().forEach((t, idx) => {
                const isIncome = t.amount > 0;
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center p-4 group hover:bg-white/50 transition-all';
                li.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full ${isIncome ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'} flex items-center justify-center">
                            <i class="${isIncome ? 'ri-add-line' : 'ri-subtract-line'}"></i>
                        </div>
                        <div>
                            <p class="text-sm font-bold text-slate-700">${t.desc}</p>
                            <p class="text-[10px] text-slate-400">${t.date}</p>
                        </div>
                    </div>
                    <span class="text-sm font-extrabold ${isIncome ? 'text-emerald-600' : 'text-rose-600'}">${formatCurrency(t.amount)}</span>
                `;
                historyList.appendChild(li);
            });
        }
        localStorage.setItem('finance_v2', JSON.stringify(transactions));
    }

    financeForm.addEventListener('submit', (e) => {
        e.preventDefault();
        let amount = parseFloat(document.getElementById('amount').value);
        const desc = document.getElementById('desc').value;
        if (currentType === 'expense') amount = -amount;
        
        transactions.push({ desc, amount, date: new Date().toLocaleDateString('pt-BR') });
        updateUI();
        financeForm.reset();
    });

    function clearData() { if(confirm("Zerar extrato?")) { transactions = []; updateUI(); } }
    function copyPix() { navigator.clipboard.writeText(PIX_CODE); alert("Copiado!"); }

    checkAuth();
</script>
</body>
</html>
